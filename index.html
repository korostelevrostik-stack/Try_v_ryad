<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍎 Три в ряд</title>
    <style>
        /* ===== ГЛОБАЛЬНЫЙ СБРОС ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        /* ===== ОБЁРТКА НА ВЕСЬ ЭКРАН ===== */
        #app {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(145deg, #0a0a0f 0%, #1a1a2e 100%);
            padding: 8px;
            gap: 6px;
        }

        /* ===== ВЕРХНЯЯ ПАНЕЛЬ ===== */
        #topPanel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            flex-shrink: 0;
            min-height: 44px;
            font-size: 14px;
            flex-wrap: wrap;
            gap: 4px;
        }

        #topPanel .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            color: #ffd700;
            font-size: 13px;
        }

        #topPanel .stats {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            flex-wrap: wrap;
        }

        #topPanel .stats span {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(255, 255, 255, 0.06);
            padding: 2px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        /* ===== ИГРОВОЕ ПОЛЕ ===== */
        #gameArea {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 0;
            position: relative;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 100%;
            height: 100%;
            max-width: 600px;
            max-height: 600px;
            aspect-ratio: 1 / 1;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 4px;
            gap: 3px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.06), inset 0 0 40px rgba(255, 215, 0, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.08);
            transition: all 0.3s ease;
        }

        #grid.combo-flash {
            animation: gridFlash 0.6s ease;
        }

        @keyframes gridFlash {
            0%,
            100% {
                box-shadow: 0 0 40px rgba(255, 215, 0, 0.06);
            }
            50% {
                box-shadow: 0 0 80px rgba(255, 215, 0, 0.3), inset 0 0 80px rgba(255, 215, 0, 0.1);
            }
        }

        /* ===== ЯЧЕЙКИ ===== */
        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.04);
            transition: all 0.1s ease;
            cursor: pointer;
            position: relative;
            aspect-ratio: 1 / 1;
            min-width: 0;
            min-height: 0;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            will-change: transform, opacity;
        }

        /* ===== ВЫДЕЛЕНИЕ ПРЕПЯТСТВИЙ ===== */
        .cell.has-obstacle {
            background: rgba(255, 0, 0, 0.25) !important;
            border: 2px solid rgba(255, 50, 50, 0.6);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2), inset 0 0 20px rgba(255, 0, 0, 0.1);
            animation: pulse-obstacle 1.5s ease-in-out infinite;
            z-index: 1;
        }

        .cell.has-obstacle .obstacle-layer {
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #ff6666;
            font-size: 9px;
            font-weight: bold;
            padding: 0 5px;
            border-radius: 8px;
            border: 1px solid rgba(255, 0, 0, 0.3);
            pointer-events: none;
            z-index: 5;
        }

        @keyframes pulse-obstacle {
            0%,
            100% {
                border-color: rgba(255, 50, 50, 0.5);
                box-shadow: 0 0 15px rgba(255, 0, 0, 0.15);
            }
            50% {
                border-color: rgba(255, 50, 50, 0.9);
                box-shadow: 0 0 30px rgba(255, 0, 0, 0.35);
            }
        }

        /* ===== ВЫДЕЛЕНИЕ ВЫБРАННОЙ ЯЧЕЙКИ ===== */
        .cell.selected {
            border: 3px solid #ffd700;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.5), inset 0 0 25px rgba(255, 215, 0, 0.15);
            transform: scale(1.04);
            z-index: 2;
            background: rgba(255, 215, 0, 0.15);
        }

        /* ===== БОНУСЫ НА ПОЛЕ ===== */
        .cell.bonus-rocket {
            background: rgba(255, 100, 0, 0.3) !important;
            border: 2px solid #ff6600;
            animation: pulse-bonus 1s ease-in-out infinite;
        }
        .cell.bonus-bomb {
            background: rgba(255, 0, 0, 0.3) !important;
            border: 2px solid #ff0000;
            animation: pulse-bonus 0.8s ease-in-out infinite;
        }
        .cell.bonus-rainbow {
            background: rgba(255, 0, 255, 0.3) !important;
            border: 2px solid #ff00ff;
            animation: pulse-bonus 1.2s ease-in-out infinite;
        }
        .cell.bonus-double {
            background: rgba(0, 200, 255, 0.3) !important;
            border: 2px solid #00ccff;
            animation: pulse-bonus 0.9s ease-in-out infinite;
        }

        @keyframes pulse-bonus {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.08);
            }
        }

        /* ===== АНИМАЦИЯ УДАЛЕНИЯ ===== */
        .cell.removing {
            animation: cellRemove 0.4s ease forwards;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes cellRemove {
            0% {
                transform: scale(1);
                opacity: 1;
                filter: brightness(1);
            }
            30% {
                transform: scale(1.4) rotate(10deg);
                opacity: 1;
                filter: brightness(1.8);
                box-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
            }
            100% {
                transform: scale(0) rotate(30deg);
                opacity: 0;
                filter: brightness(2.5);
            }
        }

        /* ===== АНИМАЦИЯ ПАДЕНИЯ ===== */
        .cell.dropping {
            animation: cellDrop 0.3s ease forwards;
        }

        @keyframes cellDrop {
            0% {
                transform: translateY(-60px) scale(0.8);
                opacity: 0;
            }
            60% {
                transform: translateY(8px) scale(1.05);
                opacity: 1;
            }
            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        /* ===== АНИМАЦИЯ ПОЯВЛЕНИЯ НОВЫХ ===== */
        .cell.new-cell {
            animation: cellAppear 0.35s ease forwards;
        }

        @keyframes cellAppear {
            0% {
                transform: scale(0) rotate(-30deg);
                opacity: 0;
            }
            60% {
                transform: scale(1.2) rotate(5deg);
                opacity: 1;
            }
            100% {
                transform: scale(1) rotate(0);
                opacity: 1;
            }
        }

        /* ===== АНИМАЦИЯ ПРЕПЯТСТВИЙ ===== */
        .cell.obstacle-hit {
            animation: obstacleHit 0.5s ease forwards;
        }

        @keyframes obstacleHit {
            0% {
                transform: scale(1);
                border-color: #ff4444;
            }
            30% {
                transform: scale(1.6);
                border-color: #ff8800;
                box-shadow: 0 0 50px rgba(255, 68, 68, 0.6);
            }
            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        /* ===== НИЖНЯЯ ПАНЕЛЬ ===== */
        #bottomPanel {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-shrink: 0;
            padding: 4px 0;
            flex-wrap: wrap;
        }

        #bottomPanel button {
            padding: 8px 18px;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255, 215, 0, 0.12);
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.2);
            flex: 0 1 auto;
            min-width: 80px;
            touch-action: manipulation;
        }

        #bottomPanel button:active {
            transform: scale(0.93);
            background: rgba(255, 215, 0, 0.25);
        }

        #bottomPanel button.primary {
            background: #ffd700;
            color: #0a0a0f;
            border-color: #ffd700;
        }
        #bottomPanel button.primary:active {
            background: #e6c200;
        }

        /* ===== TOAST (ВСПЛЫВАЮЩИЕ СООБЩЕНИЯ) ===== */
        #toast {
            position: fixed;
            bottom: 18%;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 10px 24px;
            border-radius: 16px;
            font-size: 16px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
            z-index: 999;
            backdrop-filter: blur(10px);
            text-align: center;
            max-width: 80vw;
            font-weight: bold;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        #toast.error {
            border-color: #ff4444;
            background: rgba(40, 0, 0, 0.9);
        }

        /* ===== ЭКРАН АВТОРИЗАЦИИ ===== */
        #authOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 20px;
        }

        #authOverlay h1 {
            font-size: 42px;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }

        #authOverlay p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            max-width: 300px;
        }

        #authOverlay button {
            padding: 16px 48px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            background: #ffd700;
            color: #0a0a0f;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
        }

        #authOverlay button:active {
            transform: scale(0.95);
        }

        /* ===== МАГАЗИН ===== */
        #shopOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 500;
        }

        #shopOverlay.active {
            display: flex;
        }

        #shopModal {
            background: linear-gradient(145deg, #1a1a2e, #0a0a0f);
            border-radius: 24px;
            padding: 24px;
            max-width: 400px;
            width: 92%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 215, 0, 0.15);
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.5);
        }

        #shopModal h2 {
            color: #ffd700;
            font-size: 24px;
            text-align: center;
            margin-bottom: 16px;
        }

        #shopModal .shop-close {
            float: right;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 28px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #shopModal .shop-close:hover {
            color: #fff;
            transform: rotate(90deg);
        }

        #shopModal .shop-money {
            text-align: center;
            font-size: 18px;
            color: #ffd700;
            margin-bottom: 16px;
            background: rgba(255, 215, 0, 0.08);
            padding: 8px;
            border-radius: 12px;
        }

        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .shop-item .info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .shop-item .name {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
        }

        .shop-item .desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .shop-item .owned {
            font-size: 12px;
            color: #ffd700;
        }

        .shop-item .buy-btn {
            padding: 6px 16px;
            border: none;
            border-radius: 20px;
            background: #ffd700;
            color: #0a0a0f;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .shop-item .buy-btn:active {
            transform: scale(0.93);
        }

        .shop-item .buy-btn.disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
        }

        /* ===== ЭКРАН ПОБЕДЫ/ПОРАЖЕНИЯ ===== */
        #gameOver {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 400;
        }

        #gameOver.active {
            display: flex;
        }

        #gameOver .go-box {
            background: linear-gradient(145deg, #1a1a2e, #0a0a0f);
            border-radius: 24px;
            padding: 32px 40px;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.15);
            max-width: 320px;
            width: 90%;
        }

        #gameOver .go-text {
            font-size: 32px;
            font-weight: bold;
            color: #ff4444;
        }

        #gameOver .go-text.win {
            color: #ffd700;
        }

        #gameOver .go-score {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            margin: 12px 0 20px;
        }

        #gameOver #restartBtn {
            padding: 12px 32px;
            border: none;
            border-radius: 30px;
            background: #ffd700;
            color: #0a0a0f;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #gameOver #restartBtn:active {
            transform: scale(0.95);
        }

        /* ===== СТАТУС ===== */
        #statusMsg {
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            padding: 2px 0;
            flex-shrink: 0;
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 480px) {
            #topPanel {
                font-size: 11px;
                padding: 2px 6px;
                min-height: 34px;
            }
            #topPanel .stats span {
                padding: 1px 6px;
                font-size: 11px;
            }
            .cell {
                font-size: 18px;
                border-radius: 5px;
            }
            #grid {
                padding: 3px;
                gap: 2px;
                border-radius: 12px;
            }
            #bottomPanel button {
                padding: 6px 12px;
                font-size: 12px;
                min-width: 60px;
            }
            #toast {
                font-size: 14px;
                padding: 8px 16px;
                bottom: 15%;
            }
            #authOverlay h1 {
                font-size: 28px;
            }
            #authOverlay button {
                padding: 12px 32px;
                font-size: 18px;
            }
            #shopModal {
                padding: 16px;
                max-width: 95%;
            }
            #gameOver .go-box {
                padding: 24px;
            }
            #gameOver .go-text {
                font-size: 24px;
            }
            .cell.has-obstacle .obstacle-layer {
                font-size: 7px;
                bottom: 0px;
            }
        }

        @media (max-width: 380px) {
            .cell {
                font-size: 14px;
            }
            #grid {
                padding: 2px;
                gap: 1.5px;
            }
            #bottomPanel button {
                font-size: 10px;
                padding: 4px 8px;
                min-width: 50px;
            }
            #topPanel .stats span {
                font-size: 9px;
                padding: 1px 4px;
            }
        }

        @media (min-width: 768px) {
            .cell {
                font-size: 40px;
                border-radius: 12px;
            }
            #grid {
                padding: 8px;
                gap: 5px;
                border-radius: 24px;
            }
            #bottomPanel button {
                font-size: 18px;
                padding: 12px 28px;
                min-width: 120px;
            }
        }

        @media (min-width: 1024px) {
            .cell {
                font-size: 48px;
            }
            #grid {
                max-width: 600px;
                max-height: 600px;
            }
        }

        /* ===== СКРОЛЛБАР ДЛЯ МАГАЗИНА ===== */
        #shopModal::-webkit-scrollbar {
            width: 4px;
        }
        #shopModal::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        #shopModal::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 10px;
        }
    </style>
</head>
<body>
