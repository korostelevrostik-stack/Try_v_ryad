<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍎 Три в ряд</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* ===== ВЕСЬ ТВОЙ CSS ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #fff; }
        #app { width: 100vw; height: 100vh; display: flex; flex-direction: column; background: #0a0a0f; padding: 8px; gap: 6px; }
        
        #topPanel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            flex-shrink: 0;
            min-height: 44px;
            flex-wrap: wrap;
            gap: 4px;
        }
        
        #topPanel .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            color: #ffd700;
            font-size: 13px;
        }
        
        #topPanel .stats {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            flex-wrap: wrap;
        }
        
        #topPanel .stats span {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(255,255,255,0.06);
            padding: 2px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255,215,0,0.2);
        }
        
        #gameArea {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 0;
            position: relative;
        }
        
        #grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 100%;
            height: 100%;
            max-width: 600px;
            max-height: 600px;
            aspect-ratio: 1/1;
            background: rgba(255,255,255,0.04);
            border-radius: 16px;
            padding: 4px;
            gap: 3px;
            border: 1px solid rgba(255,215,0,0.08);
        }
        
        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            border-radius: 8px;
            background: rgba(255,255,255,0.04);
            transition: all 0.1s ease;
            cursor: pointer;
            position: relative;
            aspect-ratio: 1/1;
            min-width: 0;
            min-height: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .cell.has-obstacle {
            background: rgba(255,0,0,0.25) !important;
            border: 2px solid rgba(255,50,50,0.6);
            animation: pulse-obstacle 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse-obstacle {
            0%, 100% { border-color: rgba(255,50,50,0.5); }
            50% { border-color: rgba(255,50,50,0.9); }
        }
        
        .cell.selected {
            border: 3px solid #ffd700;
            box-shadow: 0 0 25px rgba(255,215,0,0.5);
            transform: scale(1.04);
            z-index: 2;
            background: rgba(255,215,0,0.15);
        }
        
        .cell.removing {
            animation: cellRemove 0.4s ease forwards;
        }
        
        @keyframes cellRemove {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0) rotate(30deg); opacity: 0; }
        }
        
        .cell.dropping {
            animation: cellDrop 0.3s ease forwards;
        }
        
        @keyframes cellDrop {
            0% { transform: translateY(-60px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        
        .cell.new-cell {
            animation: cellAppear 0.35s ease forwards;
        }
        
        @keyframes cellAppear {
            0% { transform: scale(0) rotate(-30deg); opacity: 0; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }
        
        #bottomPanel {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-shrink: 0;
            padding: 4px 0;
            flex-wrap: wrap;
        }
        
        #bottomPanel button {
            padding: 8px 18px;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,215,0,0.12);
            color: #ffd700;
            border: 1px solid rgba(255,215,0,0.2);
            touch-action: manipulation;
        }
        
        #bottomPanel button:active {
            transform: scale(0.93);
        }
        
        #bottomPanel button.primary {
            background: #ffd700;
            color: #0a0a0f;
        }
        
        #toast {
            position: fixed;
            bottom: 18%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 10px 24px;
            border-radius: 16px;
            font-size: 16px;
            border: 1px solid rgba(255,215,0,0.2);
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
            z-index: 999;
            text-align: center;
        }
        
        #toast.show {
            opacity: 1;
        }
        
        #toast.error {
            border-color: #ff4444;
            background: rgba(40,0,0,0.9);
        }
        
        #authOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 20px;
        }
        
        #authOverlay h1 {
            font-size: 42px;
            color: #ffd700;
        }
        
        #authOverlay button {
            padding: 16px 48px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            background: #ffd700;
            color: #0a0a0f;
            cursor: pointer;
        }
        
        #shopOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 500;
        }
        
        #shopOverlay.active {
            display: flex;
        }
        
        #shopModal {
            background: #1a1a2e;
            border-radius: 24px;
            padding: 24px;
            max-width: 400px;
            width: 92%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255,215,0,0.15);
        }
        
        #shopModal h2 {
            color: #ffd700;
            font-size: 24px;
            text-align: center;
        }
        
        #shopModal .shop-close {
            float: right;
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            font-size: 28px;
            cursor: pointer;
        }
        
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        
        .shop-item .buy-btn {
            padding: 6px 16px;
            border: none;
            border-radius: 20px;
            background: #ffd700;
            color: #0a0a0f;
            font-weight: bold;
            cursor: pointer;
        }
        
        .shop-item .buy-btn.disabled {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.3);
            cursor: not-allowed;
        }
        
        #gameOver {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 400;
        }
        
        #gameOver.active {
            display: flex;
        }
        
        #gameOver .go-box {
            background: #1a1a2e;
            border-radius: 24px;
            padding: 32px 40px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.15);
            max-width: 320px;
            width: 90%;
        }
        
        #gameOver .go-text {
            font-size: 32px;
            font-weight: bold;
            color: #ff4444;
        }
        
        #gameOver .go-text.win {
            color: #ffd700;
        }
        
        #gameOver #restartBtn {
            padding: 12px 32px;
            border: none;
            border-radius: 30px;
            background: #ffd700;
            color: #0a0a0f;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }
        
        #statusMsg {
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            padding: 2px 0;
            flex-shrink: 0;
        }
        
        /* ===== СКРОЛЛБАР ===== */
        #shopModal::-webkit-scrollbar {
            width: 4px;
        }
        #shopModal::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        #shopModal::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 10px;
        }
        
        @media (max-width: 480px) {
            .cell { font-size: 18px; }
            #bottomPanel button { font-size: 12px; padding: 6px 12px; min-width: 60px; }
            #authOverlay h1 { font-size: 28px; }
        }
        
        @media (min-width: 768px) {
            .cell { font-size: 40px; }
        }
        
        @media (min-width: 1024px) {
            .cell { font-size: 48px; }
            #grid { max-width: 600px; max-height: 600px; }
        }
    </style>
</head>
<body>

    <!-- ===== АВТОРИЗАЦИЯ ===== -->
    <div id="authOverlay">
        <h1>💫 Три в ряд</h1>
        <p>Нажми «Войти», чтобы начать игру</p>
        <button id="authSubmitBtn">👋 Войти в игру</button>
    </div>

    <!-- ===== ГЛАВНОЕ ПРИЛОЖЕНИЕ ===== -->
    <div id="app">

        <!-- Верхняя панель -->
        <div id="topPanel">
            <div class="user-info">
                👤 <span id="userName">Гость</span>
            </div>
            <div class="stats">
                <span>🏆 <span id="score">0</span></span>
                <span>👆 <span id="moves">0</span></span>
                <span>🏅 <span id="highScore">0</span></span>
                <span>💰 <span id="moneyDisplay">0</span></span>
            </div>
        </div>

        <!-- Игровое поле -->
        <div id="gameArea">
            <div id="grid"></div>
        </div>

        <!-- Статус -->
        <div id="statusMsg">🍎 Собирай комбинации из 3+ фруктов!</div>

        <!-- Нижняя панель -->
        <div id="bottomPanel">
            <button id="newGameBtn">🔄 Новая игра</button>
            <button id="shuffleBtn">🔀 Перемешать</button>
            <button id="shopBtn" class="primary">🏪 Магазин</button>
        </div>

    </div>

    <!-- ===== TOAST ===== -->
    <div id="toast"></div>

    <!-- ===== МАГАЗИН ===== -->
    <div id="shopOverlay">
        <div id="shopModal">
            <button class="shop-close" id="shopClose">✕</button>
            <h2>🏪 Магазин</h2>
            <div class="shop-money">💰 <span id="shopMoney">0</span></div>
            <div id="shopItems"></div>
        </div>
    </div>

    <!-- ===== ПОБЕДА / ПОРАЖЕНИЕ ===== -->
    <div id="gameOver">
        <div class="go-box">
            <div class="go-text" id="goText">💀 ПОРАЖЕНИЕ</div>
            <div class="go-score" id="goScore">Очки: 0</div>
            <button id="restartBtn">🔄 Ещё раз</button>
        </div>
    </div>

    <!-- ===== ПОДКЛЮЧЕНИЕ СКРИПТОВ ===== -->
    <script src="auth.js"></script>
    <script src="game.js"></script>

</body>
  </html>
